<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VUNA Calculator</title>
  <link rel="stylesheet" href="assets/css/bootstrap.min.css" />
  <link rel="stylesheet" href="assets/css/styles.css">
  <style>
    body {
      background: linear-gradient(135deg, #0d6efd 0%, #5bc0ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }
    
    .landing-container {
      text-align: center;
      color: white;
    }
    
    .landing-container h1 {
      font-size: 3.5rem;
      font-weight: 700;
      margin-bottom: 1rem;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
    }
    
    .landing-container p {
      font-size: 1.25rem;
      margin-bottom: 2rem;
      opacity: 0.95;
      max-width: 500px;
      margin-left: auto;
      margin-right: auto;
    }
    
    .cta-btn {
      padding: 14px 40px;
      font-size: 1.1rem;
      font-weight: 600;
      border-radius: 50px;
      border: none;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
    }
    
    .cta-btn-primary {
      background: white;
      color: #0d6efd;
    }
    
    .cta-btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.25);
    }
    
    .credit {
      margin-top: 3rem;
      font-size: 0.9rem;
      opacity: 0.85;
    }
  </style>
</head>

<body>
  <div class="landing-container">
    <h1>VUNA Calculator</h1>
    <p>Fast, elegant, and powerful math at your fingertips</p>
    <a href="calculator.html" class="btn cta-btn cta-btn-primary">Launch Calculator</a>
    <p class="credit">Created by set 2025/26 Software Engineering</p>
  </div>
</body>

</html>
